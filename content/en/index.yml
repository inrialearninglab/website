moocs:
    title: Develop your skills in the digital field
    description: Structured online training courses developed with the expertise of digital science specialists, free of charge, at your own pace.
    orientation: horizontal
    reverse: true
    links:
        - label: See all MOOCs
          to: /en/moocs
          trailingIcon: "lucide:arrow-right"
