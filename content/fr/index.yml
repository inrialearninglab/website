hero:
    title: Inria Learning Lab
    description: "Former aux sciences et technologies du numérique par des parcours et ressources pédagogiques de qualité, accessibles à toutes et tous. Des ressources éducatives libres. Des environnements technologiques d'apprentissage innovants."

activity:
    reverse: true
    links:
        - label: Voir toutes les actualités
          to: blog
          trailingIcon: "lucide:arrow-right"

moocs:
    title: Développez vos compétences autour du numérique
    description: "Nos formations en ligne structurées, conçues par des scientifiques experts en sciences du numérique, accessibles gratuitemeent et à votre rythme."
    orientation: horizontal
    reverse: true
    links:
        - label: Voir tous les MOOCs
          to: moocs
          trailingIcon: "lucide:arrow-right"
    image: https://placehold.co/600x400

epocs:
    title: Explorez le numérique sur mobile
    description: "Nos modules d'apprentissage sur mobile, courts et ciblés, conçus pour l'introduction ou la sensibilisation aux enjeux du numérique."
    orientation: horizontal
    links:
        - label: Voir tous les ePocs
          to: epocs
          trailingIcon: "lucide:arrow-right"
    image: images/epoc-showcase.png

seriousGames:
    title: Apprenez en jouant
    description: "Nos jeux sérieux, comme leviers pédagogiques ludiques et engageants, pour favoriser la réflexion critique et l’apprentissage par l’expérience."
    orientation: horizontal
    reverse: true
    links:
        - label: Voir les jeux sérieux
          to: serious-games
          trailingIcon: "lucide:arrow-right"
    image: images/serious-games/phone-impact.png

