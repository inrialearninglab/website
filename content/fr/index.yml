hero:
    title: Inria Learning Lab
    description: "Inria Learning Lab conçoit et produit des ressources éducatives libres et des environnements technologiques d'apprentissage innovants. Notre objectif : former aux domaines d’expertise d’Inria grâce à des parcours et ressources pédagogiques de qualité et rendre le numérique accessible et compréhensible par toutes et tous."

